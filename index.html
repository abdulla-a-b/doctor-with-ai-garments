<!DOCTYPE html>
<html>
<head>
<title>Garments AI Doctor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px}
.container{max-width:800px;margin:auto;background:white;padding:20px;border-radius:10px}
input,select{width:100%;padding:10px;margin:5px 0}
button{padding:10px;background:#0066ff;color:white;border:none;margin:5px}
.result{background:#eef3ff;padding:15px;margin-top:10px}
</style>
</head>

<body>

<div class="container">

<h2>Garments AI Doctor</h2>

<input id="name" placeholder="Patient Name">
<input id="emp" placeholder="Employee ID">
<input id="age" type="number" placeholder="Age">

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<input id="height" placeholder="Height cm">
<input id="weight" placeholder="Weight kg">

<select id="symptom">
<option>Back Pain</option>
<option>Neck Pain</option>
<option>Shoulder Pain</option>
<option>Knee Pain</option>
<option>Heel Pain</option>
<option>Eye Strain</option>
<option>Headache</option>
<option>Fatigue</option>
<option>Gastric</option>
<option>Acidity</option>
<option>Cold</option>
<option>Cough</option>
<option>Fever</option>
<option>Anemia</option>
<option>Dehydration</option>
<option>Varicose Vein</option>
<option>Wrist Pain</option>
<option>Finger Pain</option>
<option>Skin Allergy</option>
<option>Stress</option>
</select>

<button onclick="runDoctor()">Run AI Doctor</button>
<button onclick="saveReport()">Save</button>
<button onclick="exportPDF()">PDF</button>
<button onclick="printReport()">Print</button>
<a href="dashboard.html"><button>Dashboard</button></a>

<div id="result" class="result"></div>

<canvas id="riskChart"></canvas>

</div>

<script>

let report=""
let riskScore=0

function bmi(w,h){
return (w/((h/100)*(h/100))).toFixed(1)
}

const medicineDB={
"Back Pain":"Ibuprofen, Paracetamol",
"Neck Pain":"Paracetamol",
"Knee Pain":"Ibuprofen",
"Fatigue":"Hydration, Vitamin",
"Eye Strain":"Artificial tear"
}

const doctorDB={
"Back Pain":"Orthopedic",
"Eye Strain":"Eye Specialist",
"Fatigue":"General Physician"
}

function runDoctor(){

let name=nameEl.value
let emp=empEl.value
let age=ageEl.value
let h=heightEl.value
let w=weightEl.value
let symptom=symptomEl.value

let b=bmi(w,h)

riskScore=0
if(age>40) riskScore+=15
if(b>25) riskScore+=15

let today=new Date().toLocaleDateString()

report=`
Date: ${today}
Name: ${name}
ID: ${emp}
Symptom: ${symptom}
BMI: ${b}
Risk: ${riskScore}

Medicine:
${medicineDB[symptom]}

Doctor:
${doctorDB[symptom]}
`

result.innerHTML=report.replace(/\n/g,"<br>")

drawChart(riskScore)

saveHistory()

}

function drawChart(score){

new Chart(document.getElementById("riskChart"),{
type:"bar",
data:{
labels:["Risk"],
datasets:[{label:"Risk Score",data:[score]}]
}
})

}

function saveHistory(){

let data=JSON.parse(localStorage.getItem("patients")||"[]")

data.push({
date:new Date(),
report:report,
risk:riskScore
})

localStorage.setItem("patients",JSON.stringify(data))

}

function saveReport(){
saveHistory()
alert("Saved")
}

function exportPDF(){

const { jsPDF } = window.jspdf;
const doc=new jsPDF()

doc.text(report,10,10)
doc.save("AI_Doctor.pdf")

}

function printReport(){

let w=window.open()
w.document.write(report.replace(/\n/g,"<br>"))
w.print()

}

const nameEl=document.getElementById("name")
const empEl=document.getElementById("emp")
const ageEl=document.getElementById("age")
const heightEl=document.getElementById("height")
const weightEl=document.getElementById("weight")
const symptomEl=document.getElementById("symptom")

</script>

</body>
</html>
