<!DOCTYPE html>
<html>
<head>
<title>Garments AI Doctor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:Arial;
background:#f4f6fb;
padding:20px;
}

.container{
max-width:750px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

button{
background:#0066ff;
color:white;
padding:10px;
border:none;
border-radius:5px;
margin-top:5px;
cursor:pointer;
}

.result{
margin-top:20px;
background:#eef3ff;
padding:15px;
border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>Garments AI Doctor</h2>

<input id="name" placeholder="Patient Name">
<input id="emp" placeholder="Employee ID">
<input id="age" type="number" placeholder="Age">

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<input id="height" type="number" placeholder="Height cm">
<input id="weight" type="number" placeholder="Weight kg">

<select id="work">
<option value="sitting">Sewing Operator</option>
<option value="lifting">Loading Worker</option>
<option value="standing">Standing Worker</option>
</select>

<select id="symptom">
<option>Back Pain</option>
<option>Neck Pain</option>
<option>Eye Strain</option>
<option>Knee Pain</option>
<option>Fatigue</option>
</select>

<button onclick="runDoctor()">Run AI Doctor</button>
<button onclick="saveReport()">Save Report</button>
<button onclick="exportPDF()">Export PDF</button>

<div id="result" class="result"></div>

</div>

<script>

let reportText=""

function bmi(w,h){
return (w/((h/100)*(h/100))).toFixed(1)
}

function risk(age,bmi,work){

let score=0

if(age>40) score+=15
if(bmi>25) score+=15
if(bmi>30) score+=25
if(work=="sitting") score+=15
if(work=="lifting") score+=20

return score
}

function level(score){

if(score<=25) return "LOW"
if(score<=50) return "MODERATE"
if(score<=75) return "HIGH"

return "SEVERE"
}

function harvardLogic(symptom){

if(symptom=="Back Pain"){
return {
medicine:"Paracetamol, Ibuprofen, Heat therapy",
exercise:"Back stretch, walking, posture correction",
food:"Milk, Egg, Spinach, Banana",
doctor:"Orthopedic / Physiotherapy"
}
}

if(symptom=="Neck Pain"){
return {
medicine:"Paracetamol, muscle relaxant",
exercise:"Neck stretch, shoulder roll",
food:"Nuts, Fish, Banana",
doctor:"Physiotherapy"
}
}

if(symptom=="Eye Strain"){
return {
medicine:"Artificial tears",
exercise:"20-20-20 rule",
food:"Carrot, Fish, Vitamin A",
doctor:"Eye specialist"
}
}

if(symptom=="Knee Pain"){
return {
medicine:"Ibuprofen",
exercise:"Knee stretch, walking",
food:"Calcium food, milk",
doctor:"Orthopedic"
}
}

if(symptom=="Fatigue"){
return {
medicine:"Rest, hydration",
exercise:"Light walking",
food:"Banana, egg, water",
doctor:"General physician"
}
}

}

function runDoctor(){

let name=nameEl.value
let emp=empEl.value
let age=parseInt(ageEl.value)
let gender=genderEl.value
let h=parseFloat(heightEl.value)
let w=parseFloat(weightEl.value)
let work=workEl.value
let symptom=symptomEl.value

let b=bmi(w,h)
let score=risk(age,b,work)
let rlevel=level(score)

let logic=harvardLogic(symptom)

let today=new Date().toLocaleDateString()

reportText=
`
Garments AI Doctor Report

Date: ${today}
Patient: ${name}
Employee: ${emp}
Age: ${age}
Gender: ${gender}
BMI: ${b}

Symptom: ${symptom}
Risk Score: ${score}
Risk Level: ${rlevel}

Medicine:
${logic.medicine}

Exercise:
${logic.exercise}

Food:
${logic.food}

Doctor:
${logic.doctor}
`

document.getElementById("result").innerHTML=reportText.replace(/\n/g,"<br>")

}

function saveReport(){

let reports=localStorage.getItem("reports") || ""
reports+= "\n------------------\n"+reportText
localStorage.setItem("reports",reports)

alert("Report Saved")
}

function exportPDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.text(reportText,10,10)
doc.save("AI_Doctor_Report.pdf")

}

const nameEl=document.getElementById("name")
const empEl=document.getElementById("emp")
const ageEl=document.getElementById("age")
const genderEl=document.getElementById("gender")
const heightEl=document.getElementById("height")
const weightEl=document.getElementById("weight")
const workEl=document.getElementById("work")
const symptomEl=document.getElementById("symptom")

</script>

</body>
</html>
