<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>

<body>

<h2>Patient History Dashboard</h2>

<div id="list"></div>

<script>

let data=JSON.parse(localStorage.getItem("patients")||"[]")

let html=""

data.forEach(d=>{
html+= "<hr>"+d.report.replace(/\n/g,"<br>")
})

document.getElementById("list").innerHTML=html

</script>

</body>
</html>
